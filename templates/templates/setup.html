<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup – Pritunl Port Forward Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #238636; --text: #c9d1d9; --muted: #8b949e;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 36px 32px; width: 400px; max-width: 95vw;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo-icon {
      width: 48px; height: 48px; background: var(--accent); border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 12px;
    }
    h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 8px; }
    .notice {
      background: rgba(35,134,54,.12); border: 1px solid var(--accent);
      color: #86efac; padding: 10px 14px; border-radius: 6px;
      font-size: 12px; margin-bottom: 24px; line-height: 1.6;
    }
    label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px;
    }
    input[type=password] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 6px;
      font-size: 14px; margin-bottom: 18px;
    }
    input[type=password]:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; padding: 10px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:hover { opacity: .85; }
    .error {
      background: rgba(218,54,51,.15); border: 1px solid #da3633;
      color: #fca5a5; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⟢</div>
      <h1>Initial Setup</h1>
      <p class="subtitle">Create your admin password</p>
    </div>
    <div class="notice">
      This is a one-time setup. Set a strong password to protect the
      Port Forward Manager. This only needs to be done once.
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/setup">
      <label for="password">Admin Password (min 8 characters)</label>
      <input type="password" id="password" name="password" autofocus autocomplete="new-password">
      <label for="password2">Confirm Password</label>
      <input type="password" id="password2" name="password2" autocomplete="new-password">
      <button type="submit">Set Password &amp; Continue</button>
    </form>
  </div>
</body>
</html>
