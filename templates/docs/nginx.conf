# ============================================================
# Nginx reverse proxy for pritunl-portfwd Web UI
#
# Option A — Serve at a subpath on the same domain as Pritunl
#            e.g. https://vpn.example.com/portfwd/
#
# Option B — Serve on a dedicated subdomain
#            e.g. https://portfwd.vpn.example.com/
#
# Copy whichever block you need into your nginx config,
# then: nginx -t && systemctl reload nginx
# ============================================================


# ── Option A: Subpath (recommended — reuses existing TLS cert) ─────────────
#
# Add this location block inside your existing Pritunl server {} block,
# typically found at /etc/nginx/sites-enabled/pritunl or similar.
#
# server {
#   listen 443 ssl;
#   server_name vpn.example.com;
#   ... (existing Pritunl SSL config) ...
#
#   location /portfwd/ {
#     proxy_pass         http://127.0.0.1:8181/;
#     proxy_set_header   Host              $host;
#     proxy_set_header   X-Real-IP         $remote_addr;
#     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header   X-Forwarded-Proto $scheme;
#
#     # Restrict to VPN subnet only — adjust to match your VPN network
#     allow  10.0.0.0/8;
#     allow  172.16.0.0/12;
#     allow  192.168.0.0/16;
#     allow  127.0.0.1;
#     deny   all;
#   }
# }


# ── Option B: Dedicated subdomain ─────────────────────────────────────────

server {
    listen 80;
    server_name portfwd.vpn.example.com;          # ← Change this
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portfwd.vpn.example.com;          # ← Change this

    # ── TLS ────────────────────────────────────────────────
    # If you use Let's Encrypt, run:
    #   certbot --nginx -d portfwd.vpn.example.com
    ssl_certificate     /etc/letsencrypt/live/portfwd.vpn.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfwd.vpn.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options         DENY;
    add_header X-Content-Type-Options  nosniff;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";

    # ── IP allowlist — restrict to VPN subnet ─────────────
    # Replace with your actual VPN network range from Pritunl
    allow  10.0.0.0/8;
    allow  172.16.0.0/12;
    allow  192.168.0.0/16;
    allow  127.0.0.1;
    deny   all;

    # ── Proxy to Flask app ────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/portfwd-access.log;
    error_log  /var/log/nginx/portfwd-error.log;
}
